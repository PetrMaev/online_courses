version: '3.10'

services:
  web:
    build: .
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=True
    volumes:
      - .:/code
      - static_volumes:/code/static
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
      - celery

  db:
    image: postgres:16.0
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./.env
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DATABASE_USER"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis
    ports:
      - "6379:6379"
    env_file:
      - ./.env
    depends_on:
      - db

  celery:
    build: .
    command: celery -A config worker -l INFO -P eventlet
    volumes:
      - celery_data:/var/lib/celery/data
    env_file:
      - ./.env
    depends_on:
      - redis

  beat:
    build: .
    command: celery -A config beat -l INFO
    volumes:
      - celery_beat_data:/var/lib/celery_beat/data
    env_file:
      - ./.env
    depends_on:
      - celery

volumes:
  postgres_data:
  redis_data:
  celery_data:
  celery_beat_data:
  static_volumes: